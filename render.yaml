# ─────────────────────────────────────────────────────────────────────────
# Render Blueprint — deploys the backend (Docker) + a managed Postgres in one
# step, with HTTPS and a stable *.onrender.com URL provided automatically.
#
# One-time setup:
#   1. Push this repo to GitHub (the project isn't a git repo yet — `git init`).
#   2. Render dashboard → New → Blueprint → pick the repo. It reads this file.
#   3. AUTH_SECRET / PIN_PEPPER are generated automatically. DATABASE_URL is a
#      manual secret (sync:false) — set it in the dashboard to your Neon Postgres
#      connection string (Render's free Postgres is deleted ~30 days after creation,
#      so we use an external durable DB instead). See DEMO_PREP.md §1.
#   4. After it's live, point both apps' Server URL at https://<service>.onrender.com/
#
# Notes: the free web instance cold-starts after idle (~30–60s the first hit while
# models load) — keep it warm with .github/workflows/keepalive.yml before a demo.
# ─────────────────────────────────────────────────────────────────────────
services:
  - type: web
    name: gaming-addiction-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore            # closest Render region to India; change if preferred
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: TZ
        value: "Asia/Kolkata"    # server runs in the family's timezone (IST) so
                                 # timestamps, late-night detection + "today" are correct
      - key: AUTH_ENFORCE
        value: "1"               # production requires valid tokens
      - key: AUTH_SECRET
        generateValue: true      # Render generates + stores a strong secret
      - key: PIN_PEPPER
        generateValue: true
      - key: KEEP_AUDIO
        value: "0"               # never retain raw audio in production
      # Durable external Postgres (Neon). Set the value in the Render dashboard
      # (Environment tab). sync:false means blueprint syncs never overwrite your
      # manual value. If it's ever unset, the app safely falls back to ephemeral
      # SQLite rather than crashing.
      - key: DATABASE_URL
        sync: false

# Migrated off Render's free Postgres (it is deleted ~30 days after creation) to an
# external durable Postgres (Neon, set via DATABASE_URL above). The old managed-DB
# block is intentionally removed.
